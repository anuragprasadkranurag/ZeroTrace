<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ZeroTrace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Shared Theme Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            width: 92%;
            max-width: 600px;
            margin: 80px auto;
        }

        /* Logo Integration */
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .logo img {
            width: 46px;
            filter: drop-shadow(0 0 12px rgba(0, 123, 255, .4));
        }

        .logo h2 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo span {
            color: #007bff;
        }

        /* Card Styling consistent with About/Home */
        .profile-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 22px;
            padding: 40px;
        }

        h2 {
            color: #007bff;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #bdbdbd;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            flex: 1;
            border: none;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
        }

        .logo img {
            width: 46px;
            /* Updated glow for higher visual impact */
            filter: drop-shadow(0 0 15px rgba(0, 123, 255, 0.6));
            transition: filter 0.3s ease;
        }

        .logo img:hover {
            /* Slight intensity increase on hover for interactivity */
            filter: drop-shadow(0 0 20px rgba(0, 123, 255, 0.8));
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Inside <div class="container"> before <div class="profile-card"> -->
        <div style="margin-bottom: 20px;">
            <a href="{{ url_for('home') }}" style="color: #007bff; text-decoration: none; font-size: 14px;">← Home</a>
        </div>
        <div class="logo">
            <a href="{{ url_for('home') }}"
                style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 14px;">
                <img src="{{ url_for('static', filename='img/zerotrace_logo.png') }}">
                <h2>Zero<span>Trace</span></h2>
            </a>
        </div>

        <div class="profile-card">
            <h2>Account Settings</h2>
            <!-- Inside the profile-card in profile.html -->
            <!-- Inside the profile-card in profile.html -->
            <form action="{{ url_for('update_profile') }}" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <!-- Add 'readonly' attribute initially -->
                    <input type="text" id="name-input" name="name" value="{{ user.name }}" readonly
                        style="background: #1a1a1a;">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value="{{ user.email }}" disabled style="opacity: 0.6; cursor: not-allowed;">
                </div>

                <!-- Buttons -->
                <div class="btn-group">
                    <button type="button" id="edit-btn" class="btn btn-primary" onclick="toggleEdit()">Edit</button>
                    <button type="submit" id="save-btn" class="btn btn-primary" style="display: none;">Save
                        Changes</button>
                    <a href="{{ url_for('logout') }}" class="btn btn-logout">Logout</a>
                </div>
            </form>

            <script>
                function toggleEdit() {
                    const input = document.getElementById('name-input');
                    const editBtn = document.getElementById('edit-btn');
                    const saveBtn = document.getElementById('save-btn');

                    // Remove readonly attribute to allow editing
                    input.removeAttribute('readonly');
                    input.style.background = "#0a0a0a";
                    input.focus();

                    // Toggle button visibility
                    editBtn.style.display = "none";
                    saveBtn.style.display = "block";
                }
            </script>
        </div>
    </div>

</body>

</html>
